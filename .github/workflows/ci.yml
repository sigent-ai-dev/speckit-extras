name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate command templates
        run: |
          errors=0
          for f in templates/commands/*.md; do
            echo "Checking $f..."

            if ! head -1 "$f" | grep -q "^---"; then
              echo "  FAIL: missing frontmatter opening"
              errors=$((errors + 1))
            fi

            if ! grep -q "^description:" "$f"; then
              echo "  FAIL: missing description field"
              errors=$((errors + 1))
            fi

            if ! grep -q '\$ARGUMENTS' "$f"; then
              echo "  FAIL: missing \$ARGUMENTS placeholder"
              errors=$((errors + 1))
            fi

            sections=$(grep -c "^##" "$f" || true)
            if [ "$sections" -lt 1 ]; then
              echo "  FAIL: no sections found"
              errors=$((errors + 1))
            fi

            echo "  OK ($sections sections)"
          done

          if [ "$errors" -gt 0 ]; then
            echo "FAILED: $errors validation error(s)"
            exit 1
          fi
          echo "All templates valid."

      - name: Validate extension manifests
        run: |
          for dir in extension extension-bolt; do
            echo "Checking $dir/extension.yml..."

            if [ ! -f "$dir/extension.yml" ]; then
              echo "FAIL: $dir/extension.yml not found"
              exit 1
            fi

            for field in schema_version extension requires provides; do
              if ! grep -q "^$field:" "$dir/extension.yml"; then
                echo "FAIL: $dir missing top-level field: $field"
                exit 1
              fi
            done

            count=$(grep -c "name: speckit\." "$dir/extension.yml" || true)
            if [ "$count" -ne 4 ]; then
              echo "FAIL: expected 4 commands in $dir manifest, found $count"
              exit 1
            fi

            echo "  OK ($dir manifest valid, $count commands declared)"
          done

      - name: Validate extension commands present
        run: |
          for cmd in selfreview pr dora decompose; do
            if [ ! -f "extension/commands/speckit.$cmd.md" ]; then
              echo "FAIL: extension/commands/speckit.$cmd.md missing"
              exit 1
            fi
          done
          for cmd in bolt archive retrospective roadmap; do
            if [ ! -f "extension-bolt/commands/speckit.$cmd.md" ]; then
              echo "FAIL: extension-bolt/commands/speckit.$cmd.md missing"
              exit 1
            fi
          done
          echo "All extension commands present."

  extension-install-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        pack: [extras, bolt]
    steps:
      - uses: actions/checkout@v4

      - name: Test extension install (${{ matrix.pack }})
        run: |
          tmp=$(mktemp -d)
          ./scripts/install.sh --extension --pack ${{ matrix.pack }} --target "$tmp"

          if [ ! -f "$tmp/extension.yml" ]; then
            echo "FAIL: extension.yml not installed"
            exit 1
          fi

          count=$(find "$tmp/commands" -name "speckit.*.md" | wc -l)
          if [ "$count" -ne 4 ]; then
            echo "FAIL: expected 4 commands, got $count"
            exit 1
          fi
          echo "Extension install OK ($count commands for ${{ matrix.pack }})"

      - name: Test extension dry-run
        run: |
          output=$(./scripts/install.sh --extension --dry-run)
          if ! echo "$output" | grep -q "WOULD COPY"; then
            echo "FAIL: dry-run should show WOULD COPY"
            exit 1
          fi
          echo "Dry-run OK"

  standalone-install-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        agent: [claude, gemini, copilot, cursor-agent, qwen, opencode, codex, windsurf, kilocode, auggie, roo, codebuddy, q, amp, shai]
    steps:
      - uses: actions/checkout@v4

      - name: Run standalone install for ${{ matrix.agent }} (extras)
        run: |
          tmp=$(mktemp -d)
          ./scripts/install.sh --standalone --pack extras --agent ${{ matrix.agent }} --target "$tmp"

          count=$(find "$tmp" -name "speckit*" | wc -l)
          echo "Installed $count command(s) for ${{ matrix.agent }} (extras)"

          if [ "$count" -ne 4 ]; then
            echo "FAIL: expected 4 commands, got $count"
            exit 1
          fi

      - name: Run standalone install for ${{ matrix.agent }} (bolt)
        run: |
          tmp=$(mktemp -d)
          ./scripts/install.sh --standalone --pack bolt --agent ${{ matrix.agent }} --target "$tmp"

          count=$(find "$tmp" -name "speckit*" | wc -l)
          echo "Installed $count command(s) for ${{ matrix.agent }} (bolt)"

          if [ "$count" -ne 4 ]; then
            echo "FAIL: expected 4 commands, got $count"
            exit 1
          fi

      - name: Verify format for ${{ matrix.agent }}
        run: |
          tmp=$(mktemp -d)
          ./scripts/install.sh --standalone --agent ${{ matrix.agent }} --target "$tmp"

          case "${{ matrix.agent }}" in
            gemini|qwen)
              # TOML format
              for f in "$tmp"/*.toml; do
                if ! grep -q '^description = ' "$f"; then
                  echo "FAIL: $f missing TOML description"
                  exit 1
                fi
                if ! grep -q '^prompt = """' "$f"; then
                  echo "FAIL: $f missing TOML prompt block"
                  exit 1
                fi
              done
              echo "TOML format OK for ${{ matrix.agent }}"
              ;;
            *)
              # Markdown format
              for f in "$tmp"/*.md; do
                if ! head -1 "$f" | grep -q "^---"; then
                  echo "FAIL: $f missing markdown frontmatter"
                  exit 1
                fi
              done
              echo "Markdown format OK for ${{ matrix.agent }}"
              ;;
          esac

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Shellcheck install script
        run: npx shellcheck scripts/install.sh

      - name: Shellcheck bolt scripts
        run: |
          npx shellcheck -e SC1091,SC2155 extension-bolt/scripts/bash/create-bolt.sh
          npx shellcheck -e SC1091,SC2155 extension-bolt/scripts/bash/archive-bolt.sh
          npx shellcheck -e SC1091,SC2155 extension-bolt/scripts/bash/common.sh
